apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen
  namespace: rx-demo
  labels:
    app.kubernetes.io/name: loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loadgen
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loadgen
    spec:
      automountServiceAccountToken: false
      containers:
        - name: loadgen
          image: rx-demo/loadgen:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: rx-demo-config
                  key: API_BASE_URL
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: rx-demo-config
                  key: OTEL_ENDPOINT_HTTP
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: SERVICE_NAME
              value: "rx-loadgen"
            - name: SERVICE_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: rx-demo-config
                  key: OTEL_SERVICE_NAMESPACE
            - name: ENV
              valueFrom:
                configMapKeyRef:
                  name: rx-demo-config
                  key: OTEL_ENVIRONMENT
            - name: HEALTH_WEIGHT
              value: "10"
            - name: HEALTH_ERROR_PENALTY
              value: "15"
            - name: RPS
              value: "1"
            - name: DURATION_SECONDS
              value: "0"
            - name: WORKERS
              value: "2"
            - name: CLIENT_TIMEOUT_SECONDS
              value: "10"
            - name: RX_ID_PREFIX
              value: "RX-DEMO"
            - name: RX_ID_POOL_SIZE
              value: "500"
            - name: MIX_READ
              value: "0.25"
            - name: MIX_APPROVE
              value: "0.40"
            - name: MIX_REFILL
              value: "0.35"
            - name: FAULT_PROFILE
              value: "light"
            - name: FAULT_MODES
              value: "api-slow,api-error,worker-transient-once,worker-fail,projection-timeout,projection-fail,cache-fail"
            - name: PROGRESS_INTERVAL_SECONDS
              value: "30"
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
