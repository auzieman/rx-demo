apiVersion: v1
kind: Namespace
metadata:
  name: rx-observability
  labels:
    app.kubernetes.io/part-of: rx-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: telegraf-k3s-host
  namespace: rx-observability
  labels:
    app.kubernetes.io/name: telegraf-k3s-host
data:
  telegraf.conf: |
    [agent]
      interval = "15s"
      round_interval = true
      metric_batch_size = 1000
      metric_buffer_limit = 10000
      collection_jitter = "0s"
      flush_interval = "15s"
      flush_jitter = "0s"
      omit_hostname = false

    [[outputs.prometheus_client]]
      listen = ":9273"
      metric_version = 2
      path = "/metrics"

    [[inputs.cpu]]
      percpu = true
      totalcpu = true
      collect_cpu_time = false
      report_active = true

    [[inputs.disk]]
      ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

    [[inputs.diskio]]
    [[inputs.kernel]]
    [[inputs.mem]]
    [[inputs.net]]
    [[inputs.processes]]
    [[inputs.swap]]
    [[inputs.system]]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: telegraf-k3s-host
  namespace: rx-observability
  labels:
    app.kubernetes.io/name: telegraf-k3s-host
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: telegraf-k3s-host
  template:
    metadata:
      labels:
        app.kubernetes.io/name: telegraf-k3s-host
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      automountServiceAccountToken: false
      containers:
        - name: telegraf
          image: telegraf:1.31-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9273
              hostPort: 9273
          volumeMounts:
            - name: config
              mountPath: /etc/telegraf/telegraf.conf
              subPath: telegraf.conf
              readOnly: true
            - name: hostfs
              mountPath: /hostfs
              readOnly: true
          env:
            - name: HOST_PROC
              value: /hostfs/proc
            - name: HOST_SYS
              value: /hostfs/sys
            - name: HOST_ETC
              value: /hostfs/etc
            - name: HOST_MOUNT_PREFIX
              value: /hostfs
          readinessProbe:
            httpGet:
              host: 127.0.0.1
              path: /metrics
              port: 9273
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: telegraf-k3s-host
        - name: hostfs
          hostPath:
            path: /
            type: Directory
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor-k3s
  namespace: rx-observability
  labels:
    app.kubernetes.io/name: cadvisor-k3s
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cadvisor-k3s
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cadvisor-k3s
    spec:
      hostNetwork: true
      hostPID: true
      automountServiceAccountToken: false
      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:v0.52.1
          imagePullPolicy: IfNotPresent
          args:
            - --port=18080
            - --housekeeping_interval=15s
            - --docker_only=false
            - --store_container_labels=false
          ports:
            - name: metrics
              containerPort: 18080
              hostPort: 18080
          securityContext:
            privileged: true
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: var-run
              mountPath: /var/run
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: containerd
              mountPath: /var/lib/containerd
              readOnly: true
            - name: k3s-containerd
              mountPath: /run/k3s/containerd
              readOnly: true
            - name: disk
              mountPath: /dev/disk
              readOnly: true
          readinessProbe:
            httpGet:
              host: 127.0.0.1
              path: /metrics
              port: 18080
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: rootfs
          hostPath:
            path: /
            type: Directory
        - name: var-run
          hostPath:
            path: /var/run
            type: Directory
        - name: sys
          hostPath:
            path: /sys
            type: Directory
        - name: containerd
          hostPath:
            path: /var/lib/containerd
            type: DirectoryOrCreate
        - name: k3s-containerd
          hostPath:
            path: /run/k3s/containerd
            type: DirectoryOrCreate
        - name: disk
          hostPath:
            path: /dev/disk
            type: DirectoryOrCreate
