global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: rx-demo-otel-collector
    static_configs:
      - targets:
          - otel-collector.rx-demo.svc.cluster.local:9464

  - job_name: k3s-host-telegraf
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names: ["rx-observability"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_name]
        regex: telegraf-k3s-host
        action: keep
      - source_labels: [__meta_kubernetes_endpoint_port_name]
        regex: metrics
        action: keep

  - job_name: k3s-cadvisor
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names: ["rx-observability"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_name]
        regex: cadvisor-k3s
        action: keep
      - source_labels: [__meta_kubernetes_endpoint_port_name]
        regex: metrics
        action: keep
