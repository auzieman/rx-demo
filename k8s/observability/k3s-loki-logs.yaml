apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-k3s
  namespace: rx-observability
  labels:
    app.kubernetes.io/name: promtail-k3s
data:
  promtail.yml: |
    server:
      http_listen_port: 3101
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yml

    clients:
      - url: ${LOKI_ENDPOINT}

    scrape_configs:
      - job_name: k3s-host-varlogs
        static_configs:
          - targets: [localhost]
            labels:
              job: k3s-hostlogs
              role: k3s
              host: ${NODE_NAME}
              __path__: /host/var/log/{messages,secure,cron,maillog,boot.log,firewalld}

      - job_name: k3s-pod-logs
        pipeline_stages:
          - cri: {}
        static_configs:
          - targets: [localhost]
            labels:
              job: k3s-pods
              role: k3s
              host: ${NODE_NAME}
              __path__: /host/var/log/pods/*/*/*.log
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail-k3s
  namespace: rx-observability
  labels:
    app.kubernetes.io/name: promtail-k3s
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail-k3s
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail-k3s
    spec:
      automountServiceAccountToken: false
      containers:
        - name: promtail
          image: grafana/promtail:3.1.1
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/promtail/promtail.yml
            - -config.expand-env=true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: LOKI_ENDPOINT
              value: http://swarm1.lab.auzietek.com:3100/loki/api/v1/push
          ports:
            - name: http
              containerPort: 3101
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
              readOnly: true
            - name: run
              mountPath: /run/promtail
            - name: varlog
              mountPath: /host/var/log
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: promtail-k3s
        - name: run
          emptyDir: {}
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory
