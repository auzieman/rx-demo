---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: rx-observability
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      automountServiceAccountToken: false
      containers:
        - name: grafana
          image: grafana/grafana:11.1.4
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_DATABASE_WAL
              value: "true"
            - name: GF_INSTALL_PLUGINS
              value: neildengg-grafmaid-panel
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yml
              subPath: grafana-datasources.yml
              readOnly: true
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: grafana-dashboards.yml
              readOnly: true
            - name: dashboards
              mountPath: /etc/grafana/provisioning/dashboards/json
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          projected:
            sources:
              - configMap:
                  name: rx-overview-dashboard
              - configMap:
                  name: rx-service-flow-dashboard
              - configMap:
                  name: rx-executive-health-dashboard
              - configMap:
                  name: rx-executive-flow-grafmaid-dashboard
              - configMap:
                  name: rx-grafmaid-probe-dashboard
              - configMap:
                  name: rx-traffic-map-grafmaid-dashboard
              - configMap:
                  name: rx-tempo-traces-dashboard
              - configMap:
                  name: rx-cloudevents-dashboard
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: rx-observability
  labels:
    app.kubernetes.io/name: grafana
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30300
