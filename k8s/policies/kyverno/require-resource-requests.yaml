apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: rx-demo-require-resource-requests
  annotations:
    policies.kyverno.io/title: Require Resource Requests and Limits
    policies.kyverno.io/category: Resource Management
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: resources-on-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - rx-demo
      validate:
        message: "rx-demo containers should declare CPU and memory requests and limits."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"
