apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      automountServiceAccountToken: false
      containers:
        - name: api-gateway
          image: rx-demo/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: rx-demo-config
          env:
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rx-demo-secrets
                  key: SA_PASSWORD
            - name: ConnectionStrings__LegacyDb
              value: "Server=mssql;Database=RxDemo;User Id=sa;Password=$(SA_PASSWORD);TrustServerCertificate=true;Connect Timeout=5;"
            - name: Messaging__HostName
              valueFrom:
                configMapKeyRef:
                  name: rx-demo-config
                  key: RABBITMQ_HOST
            - name: Messaging__VirtualHost
              value: "/"
            - name: Messaging__Port
              value: "5672"
            - name: Messaging__Username
              valueFrom:
                secretKeyRef:
                  name: rx-demo-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: Messaging__Password
              valueFrom:
                secretKeyRef:
                  name: rx-demo-secrets
                  key: RABBITMQ_DEFAULT_PASS
            - name: Messaging__QueueName
              value: "rx.commands"
            - name: Messaging__EventsQueue
              value: "rx.events"
            - name: Cache__Redis
              valueFrom:
                configMapKeyRef:
                  name: rx-demo-config
                  key: REDIS_ENDPOINT
            - name: ReadModel__MaxItems
              value: "500"
            - name: Otel__Endpoint
              valueFrom:
                configMapKeyRef:
                  name: rx-demo-config
                  key: OTEL_ENDPOINT_HTTP
            - name: Otel__ServiceNamespace
              valueFrom:
                configMapKeyRef:
                  name: rx-demo-config
                  key: OTEL_SERVICE_NAMESPACE
            - name: Otel__Environment
              valueFrom:
                configMapKeyRef:
                  name: rx-demo-config
                  key: OTEL_ENVIRONMENT
            - name: RxHealth__ComponentWeight
              value: "25"
            - name: RxHealth__ErrorPenaltyPercent
              value: "15"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
spec:
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
---
