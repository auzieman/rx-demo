apiVersion: batch/v1
kind: Job
metadata:
  name: loadgen
  labels:
    app.kubernetes.io/name: loadgen
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loadgen
    spec:
      restartPolicy: Never
      containers:
        - name: loadgen
          image: rx-demo/loadgen:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: rx-demo-config
                  key: API_BASE_URL
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: rx-demo-config
                  key: OTEL_ENDPOINT_HTTP
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: SERVICE_NAME
              value: "rx-loadgen"
            - name: SERVICE_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: rx-demo-config
                  key: OTEL_SERVICE_NAMESPACE
            - name: ENV
              valueFrom:
                configMapKeyRef:
                  name: rx-demo-config
                  key: OTEL_ENVIRONMENT
            - name: HEALTH_WEIGHT
              value: "10"
            - name: HEALTH_ERROR_PENALTY
              value: "15"
            - name: RPS
              value: "2"
            - name: DURATION_SECONDS
              value: "1800"
            - name: WORKERS
              value: "4"
