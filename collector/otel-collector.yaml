# Lab collector profile for rx-demo.
# Receives OTLP from the app containers, exposes Prometheus metrics locally, and
# forwards structured application logs to the shared Docker Swarm Loki endpoint.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}
  filter/metrics:
    error_mode: ignore
    metrics:
      datapoint:
        - 'attributes["queue"] == "dev-noisy"'

exporters:
  prometheus:
    endpoint: "0.0.0.0:9464"
  loki:
    endpoint: "${LOKI_ENDPOINT}"
    default_labels_enabled:
      exporter: false
      job: true
      instance: true
  otlphttp/tempo:
    endpoint: "${TEMPO_ENDPOINT}"
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [batch, filter/metrics]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [loki, debug]
